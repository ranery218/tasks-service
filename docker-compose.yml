services:
  mysql:
    image: mysql:8.4
    container_name: tasks_service_mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: tasks_service
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-proot"]
      interval: 5s
      timeout: 3s
      retries: 20
    volumes:
      - mysql_data:/var/lib/mysql

  redis:
    image: redis:7-alpine
    container_name: tasks_service_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tasks_service_app
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      HTTP_ADDR: ":8080"
      MYSQL_DSN: "root:root@tcp(mysql:3306)/tasks_service?parseTime=true&multiStatements=true"
      REDIS_ADDR: "redis:6379"
      REDIS_DB: "0"
      JWT_ACCESS_SECRET: "dev_access_secret"
      JWT_ACCESS_TTL_SEC: "3600"
      JWT_REFRESH_TTL_SEC: "2592000"
      BCRYPT_COST: "10"
    ports:
      - "8080:8080"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/healthz"]
      interval: 10s
      timeout: 3s
      retries: 10

  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: tasks_service_prometheus
    depends_on:
      app:
        condition: service_started
    ports:
      - "9090:9090"
    volumes:
      - ./deployments/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro

volumes:
  mysql_data:
